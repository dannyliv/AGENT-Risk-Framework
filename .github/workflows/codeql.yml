name: CodeQL

# Static-analysis scan for JavaScript / TypeScript.
# Runs on every push to main, every pull request, and weekly as a safety net
# in case the CodeQL rules themselves have been improved upstream.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Tuesday 08:15 UTC — off-peak, picks up rule updates quickly.
    - cron: '15 8 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
