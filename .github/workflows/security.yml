name: Security scans

# Lightweight per-commit security checks for this static-site repo.
# CodeQL lives in its own workflow (codeql.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------
  # Gitleaks — scan full git history for accidentally-committed secrets.
  # ---------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail the job if leaks are found. This is the whole point of the check.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ---------------------------------------------------------------------
  # Trivy — scan the filesystem for misconfigurations, secrets, and any
  # known CVEs if dependencies ever get added. Uploads SARIF so findings
  # appear on the Security tab.
  # ---------------------------------------------------------------------
  trivy:
    name: Filesystem scan (trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '0'  # Report, do not fail; review via Security tab

      - name: Upload Trivy SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ---------------------------------------------------------------------
  # Actionlint — catch mistakes or unsafe patterns in these workflow
  # files themselves (untrusted context interpolation, etc).
  # ---------------------------------------------------------------------
  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -sSL \
            https://github.com/rhysd/actionlint/releases/download/v1.7.4/actionlint_1.7.4_linux_amd64.tar.gz \
            | tar -xz actionlint

      - name: Run actionlint
        run: ./actionlint -color
